<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Grid Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
height:100%;
margin:0;
}

#map {
height:100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([35.68,139.76],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let gridSize = 0.005; // 約500m

let coloredGrids =
JSON.parse(localStorage.getItem("grids") || "{}");

function drawGrid(){

for(let lat=30; lat<46; lat+=gridSize){

for(let lng=128; lng<146; lng+=gridSize){

let id = lat.toFixed(3)+"_"+lng.toFixed(3);

let rect = L.rectangle(
[
[lat,lng],
[lat+gridSize,lng+gridSize]
],
{
color:"gray",
weight:1,
fillColor: coloredGrids[id] ? "rgb(0,200,0)" : null,
fillOpacity: coloredGrids[id] ? 0.5 : 0
}
).addTo(map);

rect.on("click",function(){

coloredGrids[id] = true;

localStorage.setItem(
"grids",
JSON.stringify(coloredGrids)
);

rect.setStyle({
fillColor:"rgb(0,200,0)",
fillOpacity:0.5
});

});

}
}

}

drawGrid();

</script>

</body>
</html>
