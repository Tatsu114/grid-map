<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Road Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
}

#map{
height:100vh;
width:100vw;
}

</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const gridSize = 0.0045; // 約500m

let coloredGrids = JSON.parse(localStorage.getItem("grids")) || {};

let map = L.map('map').setView([35.681236,139.767125],10);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

function gridId(lat,lng){

let x = Math.floor(lat/gridSize);
let y = Math.floor(lng/gridSize);

return x+"_"+y;

}

function drawGrid(lat,lng){

let id = gridId(lat,lng);

let baseLat = Math.floor(lat/gridSize)*gridSize;
let baseLng = Math.floor(lng/gridSize)*gridSize;

let rect = L.rectangle(
[
[baseLat,baseLng],
[baseLat+gridSize,baseLng+gridSize]
],
{
color:"gray",
weight:1,
fillColor: coloredGrids[id] ? "rgb(0,200,0)" : "transparent",
fillOpacity: coloredGrids[id] ? 0.5 : 0
}
).addTo(map);

rect.on("click",function(){

coloredGrids[id]=true;

localStorage.setItem(
"grids",
JSON.stringify(coloredGrids)
);

rect.setStyle({
fillColor:"rgb(0,200,0)",
fillOpacity:0.5
});

});

}

map.on("click",function(e){

drawGrid(e.latlng.lat,e.latlng.lng);

});

function watchLocation(){

navigator.geolocation.watchPosition(function(pos){

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

drawGrid(lat,lng);

map.setView([lat,lng],14);

},{
enableHighAccuracy:true
});

}

watchLocation();

</script>

</body>
</html>
