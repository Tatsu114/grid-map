<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Grid Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
}

#map{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

#menuButton{
position:absolute;
top:10px;
left:10px;
z-index:2000;
background:white;
padding:10px;
border-radius:6px;
font-size:20px;
cursor:pointer;
}

#menu{
position:absolute;
top:0;
left:-260px;
width:260px;
height:100%;
background:white;
z-index:2000;
padding:20px;
box-shadow:2px 0 5px rgba(0,0,0,0.3);
transition:left 0.3s;
}

#eraseToggle{
position:absolute;
top:10px;
right:10px;
z-index:2000;
background:white;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="menuButton">☰</div>

<div id="menu">

<h3>メニュー</h3>

<button onclick="moveToGPS()">📍現在地</button>
<br><br>

<button onclick="resetGrid()">🗑リセット</button>

<br><br>

<div id="counter">訪問メッシュ:0</div>

</div>

<button id="eraseToggle">🧽 消しゴム:OFF</button>

<script>

let menuOpen = false;

document.getElementById("menuButton").onclick = function(){

menuOpen = !menuOpen;

document.getElementById("menu").style.left =
menuOpen ? "0px" : "-260px";

};

let eraseMode = false;

document.getElementById("eraseToggle").onclick = function(){

eraseMode = !eraseMode;

this.innerText =
eraseMode ? "🧽 消しゴム:ON" : "🧽 消しゴム:OFF";

};

var map = L.map('map').setView([35.6812,139.7671],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap contributors'
}).addTo(map);

let gridSize = 0.005;

let coloredGrids =
JSON.parse(localStorage.getItem("grids")) || {};

function updateCounter(){

let count = Object.keys(coloredGrids).length;

document.getElementById("counter").innerText =
"訪問メッシュ:"+count;

}

function drawGrid(){

map.eachLayer(function(layer){

if(layer instanceof L.Rectangle){

map.removeLayer(layer);

}

});

let bounds = map.getBounds();

let south = Math.floor(bounds.getSouth()/gridSize)*gridSize;
let north = bounds.getNorth();

let west = Math.floor(bounds.getWest()/gridSize)*gridSize;
let east = bounds.getEast();

for(let lat=south; lat<north; lat+=gridSize){

for(let lng=west; lng<east; lng+=gridSize){

let id = lat.toFixed(3)+"_"+lng.toFixed(3);

let rect = L.rectangle(
[
[lat,lng],
[lat+gridSize,lng+gridSize]
],
{
color:"gray",
weight:1,
fillColor: coloredGrids[id] ? "rgb(0,200,0)" : null,
fillOpacity: coloredGrids[id] ? 0.5 : 0
}
).addTo(map);

rect.on("click",function(){

if(eraseMode){

delete coloredGrids[id];

}else{

coloredGrids[id] = true;

}

localStorage.setItem(
"grids",
JSON.stringify(coloredGrids)
);

updateCounter();

drawGrid();

});

}

}

}

function moveToGPS(){

navigator.geolocation.getCurrentPosition(function(pos){

map.setView(
[pos.coords.latitude,pos.coords.longitude],
15
);

});

}

function resetGrid(){

if(confirm("全部消しますか？")){

coloredGrids = {};

localStorage.removeItem("grids");

updateCounter();

drawGrid();

}

}

map.on("moveend",drawGrid);

drawGrid();

updateCounter();

</script>

</body>
</html>
