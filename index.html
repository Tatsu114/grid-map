<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title></title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
}

#map {
  height:100vh;
  width:100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

const map = L.map('map').setView([35.681236,139.767125], 12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);


// 500mメッシュ
const gridSize = 0.005;

let coloredGrids =
JSON.parse(localStorage.getItem("coloredGrids") || "{}");

let gridLayers = {};


// グリッド描画
function drawGrid(){

for(let lat=20; lat<46; lat+=gridSize){

for(let lng=122; lng<154; lng+=gridSize){

const id =
lat.toFixed(3) + "_" +
lng.toFixed(3);

if(gridLayers[id]) continue;

const polygon = L.rectangle([
[lat,lng],
[lat+gridSize,lng+gridSize]
],{

color:"gray",
weight:1,

fillColor:
coloredGrids[id]
? "rgb(0,200,0)"
: null,

fillOpacity:
coloredGrids[id]
? 0.5
: 0

}).addTo(map);


polygon.on("click",function(){

coloredGrids[id] = !coloredGrids[id];

localStorage.setItem(
"coloredGrids",
JSON.stringify(coloredGrids)
);

polygon.setStyle({

fillOpacity:
coloredGrids[id] ? 0.5 : 0

});

});

gridLayers[id]=polygon;

}

}

}

drawGrid();


// GPSで自動塗り
navigator.geolocation.watchPosition(function(position){

const lat = position.coords.latitude;
const lng = position.coords.longitude;

const gridLat =
Math.floor(lat/gridSize)*gridSize;

const gridLng =
Math.floor(lng/gridSize)*gridSize;

const id =
gridLat.toFixed(3) + "_" +
gridLng.toFixed(3);


if(!coloredGrids[id]){

coloredGrids[id] = true;

localStorage.setItem(
"coloredGrids",
JSON.stringify(coloredGrids)
);

if(gridLayers[id]){

gridLayers[id].setStyle({

fillColor:"rgb(0,200,0)",
fillOpacity:0.5

});

}

}

});

</script>

</body>
</html>
